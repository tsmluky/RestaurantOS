name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: restaurantos
          POSTGRES_PASSWORD: restaurantos
          POSTGRES_DB: restaurantos_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U restaurantos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check app tests
      - name: Pytest
        env:
          DATABASE_URL: postgresql+psycopg://restaurantos:restaurantos@localhost:55432/restaurantos_test
          JWT_SECRET_KEY: test-secret-do-not-use-in-prod
          APP_ENV: test
        run: pytest -q

  web:
    name: Web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://restaurantos-production-35e8.up.railway.app/api/v1
        run: npm run build

  mobile:
    name: Mobile (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typec